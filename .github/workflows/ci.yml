# ============================================================
# moe-engine CI — GitHub Actions  (v0.3.2)
# ============================================================
#
# Jobs:
#   lint      — ruff + mypy type-check
#   test-cpu  — Tier-0 CPU suite (235 tests, -m cpu)
#   benchmark — smoke benchmark (CPU path, correctness + regression guard)
#   docker    — smoke docker build (no GPU required)
#
# GPU jobs: guarded by `runs-on: [self-hosted, gpu]`
# Chaos jobs: manual-dispatch only (require torchrun + Gloo)
# ============================================================

name: CI

on:
  push:
    branches: [main, dev, "release/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:     # allows manual trigger from GitHub UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache

defaults:
  run:
    working-directory: moe-engine

# ---------------------------------------------------------------------------
# Job: lint
# ---------------------------------------------------------------------------
jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff mypy pydantic pyyaml types-PyYAML

      - name: ruff check
        run: ruff check pkg/ train.py benchmarks/ scripts/ --output-format=github

      - name: ruff format (check only)
        if: false   # temporarily skip this step
        run: ruff format --check pkg/ train.py benchmarks/ scripts/

      - name: mypy
        run: mypy pkg/ --ignore-missing-imports --no-error-summary
        continue-on-error: true   # non-blocking until type coverage is higher

# ---------------------------------------------------------------------------
# Job: test-cpu (Tier-0 — must pass on every commit)
# ---------------------------------------------------------------------------
  test-cpu:
    name: Tier-0 CPU tests (235 expected)
    runs-on: ubuntu-22.04
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Verify configs valid
        run: python scripts/validate_config.py configs/

      - name: Run Tier-0 CPU suite
        run: |
          pytest tests/ \
            --ignore=tests/test_chaos.py \
            --ignore=tests/test_smoke_e2e.py \
            -m cpu \
            -k "not (2rank or multiprocess or distributed_invariants)" \
            --tb=short \
            -q \
            --junitxml=test-results/junit.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-cpu
          path: moe-engine/test-results/
          retention-days: 7

# ---------------------------------------------------------------------------
# Job: test-config (dedicated config system gate)
# ---------------------------------------------------------------------------
  test-config:
    name: Config system (34 tests)
    runs-on: ubuntu-22.04
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run config tests
        run: pytest tests/test_config.py -v --tb=short

# ---------------------------------------------------------------------------
# Job: benchmark (smoke, CPU path, correctness + regression guard)
# ---------------------------------------------------------------------------
  benchmark:
    name: CPU benchmark smoke
    runs-on: ubuntu-22.04
    needs: test-cpu

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run CPU benchmark sweep
        run: |
          python benchmarks/run_benchmark.py \
            --json /tmp/ci_bench.json \
            --csv  /tmp/ci_bench.csv

      - name: Assert token conservation
        run: |
          python -c "
          import json, sys
          results = json.load(open('/tmp/ci_bench.json'))
          conservation = [r for r in results if 'conservation' in r['name']]
          for r in conservation:
              if r['notes'] != 'violations=0/100':
                  print(f'FAIL: {r[\"name\"]} {r[\"notes\"]}')
                  sys.exit(1)
          print(f'PASS: {len(conservation)} conservation checks clean')
          all_passed = all(r['passed'] for r in results)
          if not all_passed:
              failed = [r['name'] for r in results if not r['passed']]
              print(f'FAIL: {failed}')
              sys.exit(1)
          print(f'PASS: {len(results)} benchmark entries, all passed=True')
          "

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-cpu
          path: /tmp/ci_bench.json
          retention-days: 30

# ---------------------------------------------------------------------------
# Job: docker (smoke build — no GPU required)
# ---------------------------------------------------------------------------
  docker:
    name: Docker smoke build
    runs-on: ubuntu-22.04
    needs: test-cpu
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build smoke image
        run: |
          docker build \
            --target runtime \
            --tag moe-engine:ci-${{ github.sha }} \
            --file deploy/docker/Dockerfile \
            .

      - name: Smoke run inside container
        run: |
          docker run --rm \
            -e PYTHONUNBUFFERED=1 \
            moe-engine:ci-${{ github.sha }} \
            python train.py --config configs/smoke.yaml --smoke

# ---------------------------------------------------------------------------
# Job: test-gpu (Tier-1 — runs on self-hosted GPU runner)
# ---------------------------------------------------------------------------
  test-gpu:
    name: Tier-1 GPU tests (Triton kernel)
    runs-on: [self-hosted, gpu, cuda]
    needs: test-cpu
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]" triton

      - name: GPU smoke run
        run: python train.py --config configs/smoke.yaml --smoke

      - name: Triton kernel tests
        run: |
          pytest tests/test_kernels.py tests/test_kernels_numerics.py \
            -v --tb=short

      - name: GPU benchmark
        run: |
          python benchmarks/run_benchmark.py \
            --cuda \
            --json /tmp/gpu_bench_ci.json

# ---------------------------------------------------------------------------
# Job: chaos-b (manual dispatch only — requires torchrun + Gloo)
# ---------------------------------------------------------------------------
  chaos-b:
    name: Chaos Scenario B (storage stall, 10/10 expected)
    runs-on: ubuntu-22.04
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Scenario B
        run: |
          GLOO_SOCKET_IFNAME=lo pytest tests/test_chaos.py \
            -v -m chaos -k "scenario_b" --count=10 \
            2>&1 | tee /tmp/chaos_b_output.txt

      - name: Assert 10/10 pass rate
        run: |
          python -c "
          import re, sys
          text = open('/tmp/chaos_b_output.txt').read()
          passed = len(re.findall('PASSED', text))
          failed = len(re.findall('FAILED', text))
          print(f'Scenario B: {passed} passed, {failed} failed')
          if failed > 0:
              print('REGRESSION: Scenario B should be 10/10')
              sys.exit(1)
          "
